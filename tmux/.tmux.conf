set -g status-interval 1
set -g prefix C-a
unbind C-b
set -g default-command "printf '\\033[6 q'; exec $SHELL"

# Colors
set -g status-style bg=#1a1b26,fg=#a9b1d6
set -g message-style bg=#1a1b26,fg=#7aa2f7

# Status bar content
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7]  #S "
set -g status-left-length 40
set -g status-right "#[fg=#bb9af7]#(~/.tmux-nowplaying)#[fg=#a9b1d6] %Y-%m-%d %H:%M:%S "
set -g status-right-length 120

# Windows
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style fg=#3b4261
set -g pane-active-border-style fg=#7aa2f7
set -g display-panes-colour #7aa2f7
set -g display-panes-active-colour #f7768e

# Pane colors
set -g clock-mode-colour #7aa2f7
set -g copy-mode-match-style bg=#7aa2f7,fg=#1a1b26
